<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AVIUS Full Container QC Inspection</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<style>
:root{
  --charcoal:#33383C;
  --charcoal-2:#22262A;
  --teal:#1FA987;
  --teal-dark:#158268;
  --white:#FFFFFF;
  --grey:#F4F5F6;
  --grey-2:#E3E6E8;
  --grey-text:#7A8288;
  --red:#E8483C;
  --red-dark:#C93A30;
  --amber:#F0A93B;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--grey);
  color:var(--charcoal);
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:900px;margin:0 auto;min-height:100vh;background:var(--white);display:flex;flex-direction:column;}

/* Top bar */
.topbar{
  background:var(--charcoal);
  color:var(--white);
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.topbar .brand{display:flex;align-items:center;gap:10px;}
.topbar .brand-dot{width:10px;height:10px;border-radius:50%;background:var(--teal);}
.topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.3px;}
.topbar .sub{font-size:11px;color:#B7BDC2;margin-top:2px;}
.topbar button.ghost{
  background:transparent;border:1px solid #565C61;color:var(--white);
  padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;
}

.screen{flex:1;display:flex;flex-direction:column;padding:20px;padding-bottom:100px;}
.screen.centered{align-items:center;justify-content:center;text-align:center;}

h2{font-size:20px;margin:0 0 4px;color:var(--charcoal);}
p.lead{color:var(--grey-text);font-size:14px;margin:0 0 20px;}

/* Upload */
.dropzone{
  border:2px dashed var(--grey-2);
  border-radius:16px;
  padding:40px 20px;
  text-align:center;
  cursor:pointer;
  transition:.15s;
  width:100%;
}
.dropzone:hover{border-color:var(--teal);background:#F0FBF8;}
.dropzone .icon{font-size:40px;margin-bottom:10px;}
.dropzone .title{font-weight:700;font-size:15px;margin-bottom:4px;}
.dropzone .hint{font-size:12px;color:var(--grey-text);}
input[type=file]{display:none;}

/* Cards / forms */
.card{
  background:var(--white);
  border:1px solid var(--grey-2);
  border-radius:14px;
  padding:18px;
  margin-bottom:14px;
}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--grey-text);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select{
  width:100%;padding:12px 14px;border:1.5px solid var(--grey-2);border-radius:10px;
  font-size:15px;color:var(--charcoal);background:var(--white);
}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.meta-pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.meta-pill{background:var(--grey);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--charcoal);}
.meta-pill b{color:var(--teal-dark);}

/* Buttons */
.btn{
  border:none;border-radius:12px;padding:15px 20px;font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary{background:var(--teal);color:var(--white);}
.btn-primary:disabled{background:#B9E4D9;cursor:not-allowed;}
.btn-primary:active:not(:disabled){background:var(--teal-dark);}
.btn-secondary{background:var(--grey);color:var(--charcoal);}
.btn-danger{background:var(--red);color:var(--white);}
.btn-block{width:100%;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--grey-2);
  padding:12px 20px;display:flex;gap:10px;
  max-width:900px;margin:0 auto;
  box-shadow:0 -4px 16px rgba(0,0,0,.05);
  z-index:40;
}

/* Section list (critical setup) */
.section-block{margin-bottom:16px;}
.section-block h3{
  font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--white);
  background:var(--charcoal);padding:10px 14px;border-radius:10px 10px 0 0;margin:0;
  display:flex;justify-content:space-between;align-items:center;
}
.section-block h3 .toggle-all{font-size:11px;font-weight:400;color:var(--teal);background:rgba(31,169,135,.15);border:none;padding:4px 10px;border-radius:6px;cursor:pointer;text-transform:none;letter-spacing:0;}
.item-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border:1px solid var(--grey-2);border-top:none;background:var(--white);
}
.section-block .item-row:last-child{border-radius:0 0 10px 10px;}
.item-code{
  width:26px;height:26px;border-radius:7px;background:var(--grey);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--charcoal);flex-shrink:0;
}
.item-row .desc{flex:1;font-size:13.5px;line-height:1.4;}
.switch{position:relative;width:44px;height:26px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--grey-2);border-radius:999px;transition:.15s;}
.slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;background:white;border-radius:50%;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch input:checked + .slider{background:var(--red);}
.switch input:checked + .slider:before{transform:translateX(18px);}

/* Inspection flow */
.progress-wrap{padding:14px 20px 0;background:var(--white);position:sticky;top:65px;z-index:45;border-bottom:1px solid var(--grey-2);padding-bottom:12px;}
.progress-bar{height:6px;background:var(--grey-2);border-radius:999px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;background:var(--teal);transition:width .25s;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--grey-text);font-weight:600;}

.inspect-card{padding:20px 0;}
.section-tag{
  display:inline-block;background:var(--charcoal);color:var(--white);font-size:11px;
  font-weight:700;padding:5px 12px;border-radius:999px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:12px;
}
.item-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;}
.item-header .big-code{
  width:46px;height:46px;border-radius:12px;background:var(--charcoal);color:var(--white);
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;
}
.item-header .desc-block{flex:1;}
.item-header .desc-block .desc-text{font-size:16px;font-weight:600;line-height:1.45;}
.critical-badge{
  display:inline-flex;align-items:center;gap:5px;background:#FDECEA;color:var(--red-dark);
  font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;margin-top:8px;letter-spacing:.3px;
}
.critical-badge:before{content:"⚠";}

.photo-box{
  border:2px dashed var(--grey-2);border-radius:14px;
  aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
  background:var(--grey);position:relative;overflow:hidden;margin-bottom:18px;cursor:pointer;
}
.photo-box img{width:100%;height:100%;object-fit:cover;}
.photo-box .placeholder{color:var(--grey-text);font-size:13px;text-align:center;}
.photo-box .placeholder .icon{font-size:34px;display:block;margin-bottom:6px;}
.photo-box .retake{
  position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;
  border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;
}

.group-block{margin-bottom:16px;}
.match-input{width:100%;padding:14px;border:1.5px solid var(--grey-2);border-radius:10px;font-size:16px;margin-bottom:8px;}
.match-ref{font-size:12px;color:var(--grey-text);margin-bottom:8px;}
.match-ref b{color:var(--charcoal);}
.match-warn{font-size:12px;color:var(--red-dark);margin-bottom:10px;background:#FDECEA;padding:8px 12px;border-radius:8px;}
.group-label{font-size:12px;font-weight:700;color:var(--grey-text);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
.opt-row{display:flex;gap:10px;}
.opt-btn{
  flex:1;padding:16px 10px;border-radius:12px;border:2px solid var(--grey-2);background:var(--white);
  font-size:14px;font-weight:800;letter-spacing:.4px;cursor:pointer;color:var(--grey-text);
  transition:.12s;
}
.opt-btn[data-type="OK"].active{background:var(--teal);border-color:var(--teal);color:#fff;}
.opt-btn[data-type="NG"].active{background:var(--red);border-color:var(--red);color:#fff;}
.opt-btn[data-type="REWORK"].active{background:var(--amber);border-color:var(--amber);color:#fff;}
.opt-btn.critical-ng.active{box-shadow:0 0 0 4px rgba(232,72,60,.25);}

/* Summary */
.summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--grey);border-radius:12px;padding:14px;text-align:center;}
.stat-card .num{font-size:24px;font-weight:800;}
.stat-card .lbl{font-size:11px;color:var(--grey-text);font-weight:600;text-transform:uppercase;margin-top:2px;}
.stat-card.ng .num{color:var(--red);}
.stat-card.ok .num{color:var(--teal-dark);}

.summary-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--grey-2);border-radius:12px;margin-bottom:8px;background:var(--white);}
.summary-item img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--grey);}
.summary-item .info{flex:1;min-width:0;}
.summary-item .info .t1{font-size:13px;font-weight:700;}
.summary-item .info .t2{font-size:12px;color:var(--grey-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.status-chip{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;flex-shrink:0;}
.status-chip.ok{background:#E4F7F1;color:var(--teal-dark);}
.status-chip.ng{background:#FDECEA;color:var(--red-dark);}
.status-chip.pending{background:var(--grey);color:var(--grey-text);}

.empty-state{text-align:center;padding:60px 20px;color:var(--grey-text);}
.empty-state .icon{font-size:44px;margin-bottom:10px;}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--charcoal);color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;
  z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.2);
}

/* Camera overlay */
#cameraOverlay{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;}
#cameraOverlay video{flex:1;width:100%;object-fit:cover;background:#000;}
#cameraOverlay canvas{display:none;}

#markerOverlay{position:fixed;inset:0;background:#000;z-index:210;display:none;flex-direction:column;}
#markerOverlay .marker-imgwrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#markerOverlay img{max-width:100%;max-height:100%;display:block;}
#markerOverlay .marker-hint{position:absolute;top:12px;left:0;right:0;text-align:center;color:#fff;font-size:12px;font-weight:700;background:rgba(0,0,0,.5);padding:8px;}
.pin-dot{position:absolute;width:22px;height:22px;margin-left:-11px;margin-top:-22px;pointer-events:none;}
.pin-dot svg{width:100%;height:100%;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));}
.thumb-wrap{position:relative;width:100%;height:100%;}
.pin-dot-sm{width:14px;height:14px;margin-left:-7px;margin-top:-14px;}
.camera-controls{
  padding:20px;display:flex;align-items:center;justify-content:space-between;
  background:#000;
}
.camera-controls .shutter{
  width:70px;height:70px;border-radius:50%;background:#fff;border:4px solid #888;
}
.camera-controls .cam-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:14px;}

.section-jump{display:flex;gap:8px;overflow-x:auto;padding:12px 20px 0;background:var(--white);}
.section-jump button{
  flex-shrink:0;font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;
  border:1.5px solid var(--grey-2);background:var(--white);color:var(--grey-text);white-space:nowrap;
}
.section-jump button.current{border-color:var(--teal);color:var(--teal-dark);background:#F0FBF8;}
.section-jump button.done{border-color:var(--grey-2);background:var(--grey);}

/* Loading quick list */
.quick-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--grey-2);border-top:none;background:var(--white);}
.section-block .quick-row:last-child{border-radius:0 0 10px 10px;}
.quick-row .desc{flex:1;font-size:13px;line-height:1.4;}
.quick-row .qopt-row{display:flex;gap:6px;flex-shrink:0;}
.quick-row .qopt-btn{padding:9px 14px;border-radius:8px;border:2px solid var(--grey-2);background:var(--white);font-size:12px;font-weight:800;color:var(--grey-text);}
.quick-row .qopt-btn[data-type="OK"].active{background:var(--teal);border-color:var(--teal);color:#fff;}
.quick-row .qopt-btn[data-type="NG"].active{background:var(--red);border-color:var(--red);color:#fff;}
.quick-summary-bar{position:sticky;top:65px;z-index:44;background:var(--white);padding:10px 20px;border-bottom:1px solid var(--grey-2);font-size:12px;font-weight:700;color:var(--grey-text);}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="fileInput" accept=".xlsx,.xls">
<input type="file" id="photoInput" accept="image/*" capture="environment">

<div id="cameraOverlay">
  <div id="scanStatus" style="display:none;position:absolute;top:16px;left:0;right:0;text-align:center;color:#fff;font-size:13px;font-weight:700;background:rgba(0,0,0,.45);padding:10px;">กำลังสแกน...</div>
  <video id="camVideo" autoplay playsinline muted></video>
  <canvas id="camCanvas"></canvas>
  <div class="camera-controls">
    <button class="cam-btn" id="camCancel">ยกเลิก</button>
    <button class="shutter" id="camShutter"></button>
    <button class="cam-btn" id="camScanFail" style="display:none;background:rgba(232,72,60,.85);">สแกนไม่ได้ (NG)</button>
  </div>
</div>

<div id="markerOverlay">
  <div class="marker-imgwrap" id="markerImgWrap">
    <div class="marker-hint">แตะบนรูปเพื่อปักหมุดตำแหน่ง Defect (ปักได้หลายจุด)</div>
    <img id="markerImg" src="">
  </div>
  <div class="camera-controls">
    <button class="cam-btn" id="markerUndo">ลบหมุดล่าสุด</button>
    <button class="btn btn-primary btn-sm" id="markerDone" style="padding:14px 24px;">เสร็จแล้ว</button>
  </div>
</div>

<div id="sketchOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:220;display:none;flex-direction:column;">
  <div id="sketchLegend" style="display:none;align-items:center;gap:10px;padding:14px 20px;background:rgba(255,255,255,.08);"></div>
  <div style="flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:20px;">
    <div id="sketchImgWrap" style="position:relative;display:inline-block;max-width:100%;">
      <img id="sketchImg" src="" style="max-width:100%;display:block;border-radius:8px;background:#fff;">
    </div>
  </div>
  <div class="camera-controls">
    <div style="width:70px"></div>
    <button class="btn btn-primary btn-sm" id="sketchClose" style="padding:14px 24px;">ปิด</button>
    <div style="width:70px"></div>
  </div>
</div>

<script>
/* ============================ STATE ============================ */
const state = {
  screen: 'upload',
  workbook: null,
  zip: null,
  sheetNames: [],
  parsed: null,           // {meta, sections}
  jobInfo: {projectNo:'', serialNo:'', idCode:'', qaInspector:'', date:'', shift:'Day'},
  criticalMap: {},         // key `${sectionIdx}-${itemIdx}` -> bool
  results: {},             // key `${sectionIdx}-${itemIdx}` -> {photo, groupStates:{groupLabel:'OK'/'NG'}}
  curSection: 0,
  curItem: 0,
  camTargetKey: null,
  camMode: 'photo',
  hasLoadingGroup: false,
  stage: null,             // null | 'endofline' | 'loading'
  returnToLoadingList: false,
  firstPending: null,
  damageResults: {},       // side id -> {photo, status:'OK'|'NG'}
  camKind: 'item',         // 'item' | 'damage'
};

/* Fixed 6-side damage sweep for the Loading stage (per user: only check for damage,
   one photo per side, not the full checklist again). INSIDE gets 2 shots (two inner walls). */
const DAMAGE_SIDES = [
  {id:'fwd',      th:'ด้านหน้า (FWD VIEW)'},
  {id:'inb',      th:'ด้านอินบอร์ด (INB VIEW)'},
  {id:'aft',      th:'ด้านท้าย (AFT VIEW)'},
  {id:'outb',     th:'ด้านเอาท์บอร์ด (OUTB VIEW)'},
  {id:'top',      th:'ด้านบน (TOP VIEW)'},
  {id:'inside1',  th:'ด้านในตู้ ฝั่งที่ 1 (INSIDE)'},
  {id:'inside2',  th:'ด้านในตู้ ฝั่งที่ 2 (INSIDE)'},
];

/* Which of an item's groups are relevant for the current stage.
   'loading' stage only cares about the group labeled "Loading";
   'endofline' stage cares about every other group; no stage (single-pass / legacy sheets) = all groups. */
function groupsForStage(item){
  if (!state.stage) return item.groups;
  const loadingGroups = item.groups.filter(g => /loading/i.test(g.label||''));
  if (state.stage==='loading') return loadingGroups.length ? loadingGroups : item.groups;
  const otherGroups = item.groups.filter(g => !/loading/i.test(g.label||''));
  return otherGroups.length ? otherGroups : item.groups;
}

const $ = sel => document.querySelector(sel);
const app = $('#app');

/* ============================ EXCEL PARSER ============================ */
function parseWorkbook(wb, sheetName){
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
  const meta = {partNo:'', partDescription:'', customer:'', revision:''};
  const sections = [];
  let curSection = null;
  let stateCols = []; // [{label, options:[{type,col}]}]

  const norm = v => (v===null||v===undefined) ? '' : v.toString().trim();

  for (let r=0; r<rows.length; r++){
    const row = rows[r] || [];
    const A = norm(row[0]);
    const E = norm(row[4]);
    const F = norm(row[5]);
    const G = norm(row[6]);

    if (/^PART NO\.?$/i.test(A) && !meta.partNo) meta.partNo = norm(row[1]);
    if (/^PART DESCRIPTION$/i.test(A) && !meta.partDescription) meta.partDescription = norm(row[1]);
    if (/^CUSTOMER$/i.test(A) && !meta.customer) meta.customer = norm(row[1]);
    if (/^REVISION NO\.?$/i.test(A) && !meta.revision) meta.revision = norm(row[1]);

    // detect a state-column row (contains 2+ cells that are exactly OK/NG/Rework)
    const found = [];
    for (let c=0;c<row.length;c++){
      const v = norm(row[c]);
      if (/^(OK|NG|Rework)$/i.test(v)) found.push({col:c, type:v.toUpperCase()});
    }
    if (found.length >= 2){
      const prevRow = rows[r-1] || [];
      const groups = [];
      let i=0;
      while(i<found.length){
        const g=[found[i]]; i++;
        while(i<found.length && found[i].type!=='OK'){ g.push(found[i]); i++; }
        groups.push(g);
      }
      stateCols = groups.map(g=>{
        const label = norm(prevRow[g[0].col]);
        return {label, options: g.map(x=>({type:x.type, col:x.col}))};
      });
      continue;
    }

    // section title row: F has text, G empty, not a form-label row
    const isFormLabel = /^(ID CODE NO\.?|SERIAL NO\.?|PART NO\.?|PART DESCRIPTION|CUSTOMER|REVISION NO\.?|PROJECT NO\.?|No\.?|Critical.*)$/i.test(F);
    if (F && !G && !isFormLabel){
      curSection = {name:F, items:[]};
      sections.push(curSection);
      continue;
    }

    // item row
    if (G && !/^Item$/i.test(G) && stateCols.length>0){
      if (!curSection){ curSection = {name:'ทั่วไป', items:[]}; sections.push(curSection); }
      let scanType = null;
      if (/QR/i.test(G)) scanType = 'qr';
      else if (/บาร์โค้ด|บาร์โค๊ด|barcode/i.test(G)) scanType = 'barcode';
      const isCodeMatch = !scanType && (/[.]{3,}|…/.test(G) || /หมายเลขตู้/.test(G));
      let legendColor = null;
      try{
        const addr = XLSX.utils.encode_cell({r:r, c:5});
        const cellObj = ws[addr];
        if (cellObj && cellObj.s && cellObj.s.fgColor && cellObj.s.fgColor.rgb && cellObj.s.fgColor.rgb.length>=6){
          legendColor = '#' + cellObj.s.fgColor.rgb.slice(-6);
        }
      }catch(e){}
      curSection.items.push({
        code: F || null,
        desc: G,
        rowIdx: r,
        criticalFromFile: !!E,
        matchType: isCodeMatch ? 'code' : null,
        scanType,
        legendColor,
        groups: stateCols.map(g=>({label:g.label, options:g.options.map(o=>o.type)}))
      });
    }
  }
  return {meta, sections: sections.filter(s=>s.items.length>0)};
}

/* ============================ CRITICAL-POINT SHAPE DETECTION ============================ */
/* The source files mark "Critical Point" with a red triangle SHAPE drawn over column E,
   not a cell value — so we read the sheet's embedded drawing XML straight out of the .xlsx zip. */
function normalizePath(p){
  const stack=[];
  p.split('/').forEach(part=>{
    if (part==='..') stack.pop();
    else if (part!=='.' && part!=='') stack.push(part);
  });
  return stack.join('/');
}
async function readZipXml(zip, path){
  const f = zip.file(path);
  if (!f) return null;
  const text = await f.async('string');
  return new DOMParser().parseFromString(text, 'application/xml');
}
async function getSheetPathForName(zip, sheetName){
  const wbXml = await readZipXml(zip, 'xl/workbook.xml');
  if (!wbXml) return null;
  const sheets = wbXml.getElementsByTagName('sheet');
  let rId = null;
  for (let i=0;i<sheets.length;i++){
    if (sheets[i].getAttribute('name') === sheetName){
      rId = sheets[i].getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','id')
            || sheets[i].getAttribute('r:id');
      break;
    }
  }
  if (!rId) return null;
  const relsXml = await readZipXml(zip, 'xl/_rels/workbook.xml.rels');
  if (!relsXml) return null;
  const rels = relsXml.getElementsByTagName('Relationship');
  let target=null;
  for (let i=0;i<rels.length;i++){
    if (rels[i].getAttribute('Id')===rId){ target = rels[i].getAttribute('Target'); break; }
  }
  if (!target) return null;
  return normalizePath('xl/' + target);
}
async function getDrawingPathForSheet(zip, sheetName){
  const sheetPath = await getSheetPathForName(zip, sheetName);
  if (!sheetPath) return null;
  const sheetRelsPath = sheetPath.replace(/([^/]+)$/, '_rels/$1.rels');
  const sheetRelsXml = await readZipXml(zip, sheetRelsPath);
  if (!sheetRelsXml) return null;
  const srels = sheetRelsXml.getElementsByTagName('Relationship');
  let drawingTarget=null;
  for (let i=0;i<srels.length;i++){
    const type = srels[i].getAttribute('Type')||'';
    if (type.indexOf('drawing')>=0){ drawingTarget = srels[i].getAttribute('Target'); break; }
  }
  if (!drawingTarget) return null;
  return normalizePath('xl/worksheets/' + drawingTarget);
}
async function getTriangleShapeRows(zip, sheetName){
  try{
    const drawingPath = await getDrawingPathForSheet(zip, sheetName);
    if (!drawingPath) return [];
    const dxml = await readZipXml(zip, drawingPath);
    if (!dxml) return [];
    const anchors = dxml.getElementsByTagName('xdr:twoCellAnchor');
    const out = [];
    for (let i=0;i<anchors.length;i++){
      const anchor = anchors[i];
      const geoms = anchor.getElementsByTagName('a:prstGeom');
      let isTriangle=false;
      for (let j=0;j<geoms.length;j++){
        if (geoms[j].getAttribute('prst')==='triangle'){ isTriangle=true; break; }
      }
      if (!isTriangle) continue;
      const cols = anchor.getElementsByTagName('xdr:col');
      const rowsEls = anchor.getElementsByTagName('xdr:row');
      if (!cols.length || !rowsEls.length) continue;
      out.push({col: parseInt(cols[0].textContent,10), row: parseInt(rowsEls[0].textContent,10)});
    }
    return out;
  }catch(e){
    console.warn('critical-shape detection failed', e);
    return [];
  }
}
function applyCriticalShapes(ws, parsed, shapeRows){
  if (!shapeRows.length) return 0;
  const merges = ws['!merges']||[];
  let applied = 0;
  shapeRows.forEach(sh=>{
    if (sh.col!==4) return; // column E = Critical Point
    const merge = merges.find(m=> m.s.c<=4 && 4<=m.e.c && m.s.r<=sh.row && sh.row<=m.e.r);
    let best=null, bestDist=Infinity;
    parsed.sections.forEach(sec=>{
      sec.items.forEach(it=>{
        if (it.rowIdx===undefined) return;
        let dist;
        if (merge && merge.s.r<=it.rowIdx && it.rowIdx<=merge.e.r) dist = 0;
        else dist = Math.abs(it.rowIdx - sh.row);
        if (dist < bestDist){ bestDist = dist; best = it; }
      });
    });
    if (best && bestDist<=3 && !best.criticalFromFile){ best.criticalFromFile = true; applied++; }
  });
  return applied;
}

/* ============================ SECTION SKETCH EXTRACTION ============================ */
/* Each view (FWD/INB/AFT/...) has a reference sketch picture embedded above it, showing
   where each lettered point (A, B, C...) physically is on the container. We pull the
   picture out of the drawing XML (PNG/JPEG only — EMF/WMF vector images aren't renderable
   in a browser) and attach the nearest one to each section. */
function extFromPath(p){
  const m = /\.([a-z0-9]+)$/i.exec(p||'');
  return m ? m[1].toLowerCase() : '';
}
function mimeForExt(ext){
  if (ext==='png') return 'image/png';
  if (ext==='jpg' || ext==='jpeg') return 'image/jpeg';
  if (ext==='gif') return 'image/gif';
  return null;
}
function parseAnchorPoint(el){
  if (!el) return null;
  const col = el.getElementsByTagName('xdr:col')[0];
  const colOff = el.getElementsByTagName('xdr:colOff')[0];
  const row = el.getElementsByTagName('xdr:row')[0];
  const rowOff = el.getElementsByTagName('xdr:rowOff')[0];
  if (!col || !row) return null;
  return {
    col: parseInt(col.textContent,10),
    colOff: colOff ? parseInt(colOff.textContent,10) : 0,
    row: parseInt(row.textContent,10),
    rowOff: rowOff ? parseInt(rowOff.textContent,10) : 0,
  };
}
async function getSectionSketches(zip, sheetName){
  try{
    const drawingPath = await getDrawingPathForSheet(zip, sheetName);
    if (!drawingPath) return [];
    const relsPath = drawingPath.replace(/([^/]+)$/, '_rels/$1.rels');
    const relsXml = await readZipXml(zip, relsPath);
    const ridToTarget = {};
    if (relsXml){
      const rels = relsXml.getElementsByTagName('Relationship');
      for (let i=0;i<rels.length;i++){
        ridToTarget[rels[i].getAttribute('Id')] = normalizePath('xl/drawings/' + rels[i].getAttribute('Target'));
      }
    }
    const dxml = await readZipXml(zip, drawingPath);
    if (!dxml) return [];
    const anchors = dxml.getElementsByTagName('xdr:twoCellAnchor');
    const out = [];
    for (let i=0;i<anchors.length;i++){
      const anchor = anchors[i];
      const pics = anchor.getElementsByTagName('xdr:pic');
      if (!pics.length) continue;
      const blipFills = anchor.getElementsByTagName('a:blip');
      if (!blipFills.length) continue;
      const rId = blipFills[0].getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed')
                  || blipFills[0].getAttribute('r:embed');
      const target = rId ? ridToTarget[rId] : null;
      if (!target) continue;
      const ext = extFromPath(target);
      const mime = mimeForExt(ext);
      if (!mime) continue; // skip EMF/WMF etc — can't render in browser
      const from = parseAnchorPoint(anchor.getElementsByTagName('xdr:from')[0]);
      const to = parseAnchorPoint(anchor.getElementsByTagName('xdr:to')[0]);
      if (!from) continue;
      if (from.col!==0) continue; // sketches are anchored at column A in these files
      const f = zip.file(target);
      if (!f) continue;
      const base64 = await f.async('base64');
      out.push({row: from.row, from, to, dataUrl: `data:${mime};base64,${base64}`});
    }
    out.sort((a,b)=>a.row-b.row);
    return out;
  }catch(e){
    console.warn('sketch extraction failed', e);
    return [];
  }
}
function assignSketchesToSections(parsed, sketches){
  if (!sketches.length) return 0;
  const used = new Set();
  let applied = 0;
  parsed.sections.forEach(sec=>{
    const firstRow = sec.items.reduce((min,it)=> it.rowIdx!==undefined ? Math.min(min, it.rowIdx) : min, Infinity);
    if (firstRow===Infinity) return;
    let best=null;
    sketches.forEach((sk,idx)=>{
      if (used.has(idx)) return;
      if (sk.row <= firstRow && (!best || sk.row > best.sk.row)) best = {sk, idx};
    });
    if (best){
      sec.sketch = best.sk.dataUrl;
      sec.sketchBBox = {from: best.sk.from, to: best.sk.to};
      used.add(best.idx);
      applied++;
    }
  });
  return applied;
}

/* ============================ ARROW PIN EXTRACTION ============================ */
/* Beyond the base sketch picture, the file also draws small colored legend boxes
   (as EMF pictures — can't be rasterized) connected by arrow lines pointing at the
   exact spot on the container. We can't read the EMF legend text, but we CAN read
   the arrows' geometry, so: cluster the legend picture positions in row/column order
   (top-to-bottom matches the item order A,B,C... as laid out in the file), match each
   arrow to its nearest legend picture, and use the arrow's far end as that item's pin. */
async function getSheetGeometry(zip, sheetName){
  const sheetPath = await getSheetPathForName(zip, sheetName);
  if (!sheetPath) return null;
  const f = zip.file(sheetPath);
  if (!f) return null;
  const text = await f.async('string');
  const colWidths = {}; // 1-indexed col -> width (chars)
  const colRe = /<col min="(\d+)" max="(\d+)" width="([\d.]+)"/g;
  let m;
  while ((m = colRe.exec(text))){
    const min=+m[1], max=+m[2], w=+m[3];
    for (let c=min;c<=max;c++) colWidths[c]=w;
  }
  let defaultRowHeight = 14.5;
  const sfp = /<sheetFormatPr[^>]*defaultRowHeight="([\d.]+)"/.exec(text);
  if (sfp) defaultRowHeight = +sfp[1];
  const rowHeights = {}; // 1-indexed row -> height (pt)
  const rowRe = /<row r="(\d+)"([^>]*?)\/?>/g;
  while ((m = rowRe.exec(text))){
    const rnum = +m[1];
    const htm = /ht="([\d.]+)"/.exec(m[2]);
    if (htm) rowHeights[rnum] = +htm[1];
  }
  return {colWidths, rowHeights, defaultRowHeight};
}
function makeGeometryConverter(geom){
  const colPxWidth = c => (geom.colWidths[c] !== undefined ? geom.colWidths[c] : 8.43) * 7 + 5;
  const rowPxHeight = r => (geom.rowHeights[r] !== undefined ? geom.rowHeights[r] : geom.defaultRowHeight) * 96/72;
  const colStartPx = c0 => { let px=0; for (let c=1;c<=c0;c++) px+=colPxWidth(c); return px; }; // c0 is 0-indexed col; sums 1-indexed cols 1..c0
  const rowStartPx = r0 => { let px=0; for (let r=1;r<=r0;r++) px+=rowPxHeight(r); return px; };
  return {
    toPx(anchorPt){
      return {
        x: colStartPx(anchorPt.col) + anchorPt.colOff/9525,
        y: rowStartPx(anchorPt.row) + anchorPt.rowOff/9525,
      };
    }
  };
}
async function getSectionArrowPins(zip, sheetName, parsed){
  try{
    const geom = await getSheetGeometry(zip, sheetName);
    const drawingPath = await getDrawingPathForSheet(zip, sheetName);
    if (!geom || !drawingPath) return 0;
    const conv = makeGeometryConverter(geom);
    const relsPath = drawingPath.replace(/([^/]+)$/, '_rels/$1.rels');
    const relsXml = await readZipXml(zip, relsPath);
    const ridToTarget = {};
    if (relsXml){
      const rels = relsXml.getElementsByTagName('Relationship');
      for (let i=0;i<rels.length;i++){
        ridToTarget[rels[i].getAttribute('Id')] = rels[i].getAttribute('Target')||'';
      }
    }
    const dxml = await readZipXml(zip, drawingPath);
    if (!dxml) return 0;
    const anchors = dxml.getElementsByTagName('xdr:twoCellAnchor');

    // Collect legend pictures (EMF, small icons) and arrow connectors, each with px position
    const legendPics = []; // {px:{x,y}, row}
    const arrows = []; // {fromPx, toPx}
    for (let i=0;i<anchors.length;i++){
      const anchor = anchors[i];
      const from = parseAnchorPoint(anchor.getElementsByTagName('xdr:from')[0]);
      const to = parseAnchorPoint(anchor.getElementsByTagName('xdr:to')[0]);
      if (!from || !to) continue;
      if (anchor.getElementsByTagName('xdr:pic').length){
        const blip = anchor.getElementsByTagName('a:blip')[0];
        const rId = blip ? (blip.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed') || blip.getAttribute('r:embed')) : null;
        const target = rId ? (ridToTarget[rId]||'') : '';
        if (/\.emf$/i.test(target)){
          legendPics.push({px: conv.toPx(from), row: from.row});
        }
      } else if (anchor.getElementsByTagName('xdr:cxnSp').length){
        arrows.push({fromPx: conv.toPx(from), toPx: conv.toPx(to)});
      }
    }
    if (!legendPics.length || !arrows.length) return 0;

    let applied = 0;
    parsed.sections.forEach(sec=>{
      if (!sec.sketch || !sec.sketchBBox) return;
      const bboxFromPx = conv.toPx(sec.sketchBBox.from);
      const bboxToPx = conv.toPx(sec.sketchBBox.to);
      const bw = bboxToPx.x - bboxFromPx.x, bh = bboxToPx.y - bboxFromPx.y;
      if (bw<=0 || bh<=0) return;
      const itemRows = sec.items.map(it=>it.rowIdx).filter(r=>r!==undefined);
      if (!itemRows.length) return;
      const minRow = Math.min(...itemRows), maxRow = Math.max(...itemRows);
      // legend pics + arrows belonging to this section's visual area (a bit above the items, through to the last item)
      const secLegends = legendPics.filter(lp => lp.row >= minRow-20 && lp.row <= maxRow);
      const secArrows = arrows.filter(ar => {
        const r = ar.fromPx.y; // rough row-space check using px is fine as an inclusion filter
        return ar.fromPx.y >= bboxFromPx.y-40 && ar.fromPx.y <= bboxFromPx.y+bh+40;
      });
      if (!secLegends.length || !secArrows.length) return;
      // top-to-bottom, left-to-right order matches the item order (A, B, C...) as laid out in the file
      secLegends.sort((a,b)=> a.px.y-b.px.y || a.px.x-b.px.x);
      const n = Math.min(secLegends.length, sec.items.length);
      for (let idx=0; idx<n; idx++){
        const legend = secLegends[idx];
        const item = sec.items[idx];
        // nearest arrow to this legend picture (by its near/from endpoint)
        let best=null, bestDist=Infinity;
        secArrows.forEach(ar=>{
          const d = Math.hypot(ar.fromPx.x-legend.px.x, ar.fromPx.y-legend.px.y);
          if (d < bestDist){ bestDist=d; best=ar; }
        });
        if (!best || bestDist>140) continue; // too far to be confidently the same point
        // use the endpoint FARTHER from the legend as the target (the arrowhead into the diagram)
        const dFrom = Math.hypot(best.fromPx.x-legend.px.x, best.fromPx.y-legend.px.y);
        const dTo = Math.hypot(best.toPx.x-legend.px.x, best.toPx.y-legend.px.y);
        const target = dTo > dFrom ? best.toPx : best.fromPx;
        const px = (target.x - bboxFromPx.x) / bw * 100;
        const py = (target.y - bboxFromPx.y) / bh * 100;
        if (px>=-5 && px<=105 && py>=-5 && py<=105){
          item.pin = {x: Math.max(0,Math.min(100,px)), y: Math.max(0,Math.min(100,py))};
          applied++;
        }
      }
    });
    return applied;
  }catch(e){
    console.warn('arrow pin extraction failed', e);
    return 0;
  }
}

async function pickSheet(name){
  const parsed = parseWorkbook(state.workbook, name);
  if (!parsed.sections.length || !parsed.sections.some(s=>s.items.length)){
    toast('ไม่พบรายการตรวจในชีตนี้ ลองเลือกชีตอื่น');
    return;
  }
  state.parsed = parsed;
  state.hasLoadingGroup = parsed.sections.some(sec=>sec.items.some(it=>it.groups.some(g=>/loading/i.test(g.label||''))));
  if (state.zip){
    toast('กำลังอ่านจุด Critical Point จากไฟล์...');
    try{
      const shapeRows = await getTriangleShapeRows(state.zip, name);
      const ws = state.workbook.Sheets[name];
      const n = applyCriticalShapes(ws, parsed, shapeRows);
      if (n>0) toast(`พบจุด Critical Point ${n} จุด จากสัญลักษณ์สามเหลี่ยมในไฟล์`);
    }catch(err){ console.warn(err); }
    try{
      const sketches = await getSectionSketches(state.zip, name);
      const sN = assignSketchesToSections(parsed, sketches);
      if (sN>0) toast(`พบภาพ Sketch ตำแหน่งจุดตรวจ ${sN} รูป`);
    }catch(err){ console.warn(err); }
    try{
      const pN = await getSectionArrowPins(state.zip, name, parsed);
      if (pN>0) toast(`ระบุตำแหน่งจุดตรวจแม่นยำได้ ${pN} จุด จากลูกศรในไฟล์`);
    }catch(err){ console.warn(err); }
  }
  const d = new Date();
  state.jobInfo.date = d.toISOString().slice(0,10);
  state.screen = 'jobinfo';
  render();
}

function saveJobInfo(){
  state.jobInfo.projectNo = $('#f_project').value;
  state.jobInfo.serialNo = $('#f_serial').value;
  state.jobInfo.idCode = $('#f_idcode').value;
  state.jobInfo.qaInspector = $('#f_qa').value;

  state.jobInfo.shift = $('#f_shift').value;

    sec.items.forEach((it,ii)=>{

/* ---------- Screen: Inspection flow ---------- */
function flatIndex(){
  let idx=0;
  for (let s=0;s<state.curSection;s++) idx += state.parsed.sections[s].items.length;
  return idx + state.curItem;
}
function totalItems(){
  return state.parsed.sections.reduce((a,s)=>a+s.items.length,0);
}

function renderInspect(){
  const sections = state.parsed.sections;
  const sec = sections[state.curSection];
  const item = sec.items[state.curItem];
  const key = `${state.curSection}-${state.curItem}`;
  const critical = !!state.criticalMap[key];
  const result = state.results[key] || {photo:null, groupStates:{}};
  state.results[key] = result;

  const doneCount = flatIndex();
  const total = totalItems();
  const pct = Math.round((doneCount/total)*100);

  const activeGroups = groupsForStage(item);
  const allGroupsSet = activeGroups.every(g => result.groupStates[g.label||'_']);
  const canNext = !!result.photo && allGroupsSet;
  const normalize = s => (s||'').toString().trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  const isCodeMatch = item.matchType === 'code';
  const isScan = !!item.scanType;
  const ref = state.jobInfo.idCode;
  const entered = result.enteredCode || '';
  const matched = entered && ref && normalize(entered)===normalize(ref);
  const scanOk = result.groupStates[activeGroups[0] ? (activeGroups[0].label||'_') : '_'] === 'OK';

  let bodyHtml;
  if (isScan){
    if (result.scannedValue !== undefined && result.photo && Object.values(result.groupStates).length){
      bodyHtml = `<div class="group-block">
        ${scanOk
          ? `<span class="status-chip ok">สแกนสำเร็จ — อ่านค่าได้: ${escapeHtml(result.scannedValue||'')}</span>`
          : `<span class="status-chip ng">สแกนไม่ผ่าน (NG) — บันทึกเป็นหลักฐานแล้ว</span>`}
        <button class="btn btn-secondary btn-sm" style="margin-top:10px" onclick="openCamera('${key}','scan')">สแกนใหม่</button>
      </div>`;
    } else {
      bodyHtml = `<div class="match-ref">แตะรูปด้านบนเพื่อเปิดกล้องและสแกน ${item.scanType==='qr'?'QR Code':'Barcode'} — ระบบจะตัดสิน OK/NG ให้อัตโนมัติ</div>`;
    }
  } else if (isCodeMatch && ref){
    bodyHtml = `<div class="group-block">
      <div class="match-ref">เลขอ้างอิง (ID Code No.): <b>${escapeHtml(ref)}</b></div>
      <input id="matchInput" class="match-input" style="border-color:${entered?(matched?'var(--teal)':'var(--red)'):'var(--grey-2)'}"
        placeholder="กรอกหมายเลขที่อ่านได้จากตู้ ณ จุดนี้" value="${escapeHtml(entered)}">
      <span id="matchBadge" class="status-chip ${entered?(matched?'ok':'ng'):'pending'}" style="${entered?'':'display:none'}">
        ${entered ? (matched ? 'OK — ตรงกับเลขอ้างอิง' : 'NG — ไม่ตรงกับเลขอ้างอิง') : ''}
      </span>
    </div>`;
  } else {
    bodyHtml = (isCodeMatch ? `<div class="match-warn">⚠ ยังไม่ได้กรอก "ID Code No." ที่หน้าข้อมูลงาน ระบบเลยยังตรวจ Matching อัตโนมัติให้ไม่ได้ — กรุณากดตรวจเองก่อน หรือย้อนกลับไปกรอกเลขอ้างอิง</div>` : '') +
      activeGroups.map((g,gi)=>{
        const gkey = g.label || '_';
        const cur = result.groupStates[gkey];
        return `<div class="group-block">
          ${g.label ? `<div class="group-label">${escapeHtml(g.label)}</div>` : ''}
          <div class="opt-row">
            ${g.options.map(opt=>`
              <button class="opt-btn ${cur===opt?'active':''} ${opt==='NG'&&critical?'critical-ng':''}" data-type="${opt}"
                onclick="setGroupState('${key}','${gkey.replace(/'/g,"\\'")}','${opt}')">${opt}</button>
            `).join('')}
          </div>
        </div>`;
      }).join('');
  }

  const stageBadge = state.stage ? `<span style="font-size:11px;font-weight:700;color:var(--teal-dark);background:#F0FBF8;padding:4px 10px;border-radius:999px;margin-left:8px;">${state.stage==='loading'?'LOADING':'END OF LINE'}</span>` : '';

  app.innerHTML = `
    ${topbar(`${state.jobInfo.projectNo||'งานตรวจ'} · ${state.parsed.meta.partNo||''}`)}
    <div class="progress-wrap">
      <div class="progress-label"><span>ข้อที่ ${doneCount+1} / ${total} ${stageBadge}</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-jump">
      ${sections.map((s,si)=>`<button class="${si===state.curSection?'current':(si<state.curSection?'done':'')}" onclick="jumpSection(${si})">${s.name}</button>`).join('')}
    </div>
    <div class="screen">
      <div class="inspect-card">
        <div class="section-tag">${sec.name}</div>
        <div class="item-header">
          <div class="big-code" style="${item.legendColor?`box-shadow:0 0 0 4px ${item.legendColor};`:''}">${item.code||'•'}</div>
          <div class="desc-block">
            <div class="desc-text">${escapeHtml(item.desc)}</div>
            ${critical ? '<div class="critical-badge">CRITICAL POINT</div>' : ''}
          </div>
        </div>

        ${sec.sketch ? `<div onclick="openSketchForSection(${state.curSection})" style="display:flex;align-items:center;gap:10px;background:var(--grey);border-radius:12px;padding:10px 14px;margin-bottom:16px;cursor:pointer;">
          <img src="${sec.sketch}" style="width:44px;height:44px;object-fit:contain;background:#fff;border-radius:6px;">
          <div style="flex:1;font-size:12.5px;font-weight:700;color:var(--charcoal);">
            🗺️ ดูตำแหน่งจุด ${item.code||''} บนตู้ (Sketch) ${item.pin?'<span style="color:var(--teal-dark);">📍 ระบุตำแหน่งแล้ว</span>':''}
            ${item.legendColor ? `<div style="font-weight:400;color:var(--grey-text);margin-top:2px;display:flex;align-items:center;gap:6px;">มองหากล่องสีนี้ในรูป <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${item.legendColor};border:1px solid rgba(0,0,0,.15);"></span></div>` : ''}
          </div>
          <div style="color:var(--grey-text);font-size:16px;">›</div>
        </div>` : ''}

        <div class="photo-box" id="photoBox">
          ${result.photo
            ? `<img src="${result.photo}"><button class="retake" id="retakeBtn">${isScan?'สแกนใหม่':'ถ่ายใหม่'}</button>`
            : isScan
              ? `<div class="placeholder"><span class="icon">🔳</span>แตะเพื่อสแกน ${item.scanType==='qr'?'QR Code':'Barcode'}</div>`
              : `<div class="placeholder"><span class="icon">📷</span>แตะเพื่อถ่ายรูปจุดตรวจนี้</div>`}
        </div>

        ${bodyHtml}
      </div>
    </div>
    <div class="bottom-bar">
      ${state.returnToLoadingList
        ? `<button class="btn btn-primary btn-block" id="nextBtn" ${canNext?'':'disabled'} onclick="finishReturnToLoadingList()">✓ เสร็จแล้ว กลับไปลิสต์</button>`
        : `<button class="btn btn-secondary" style="flex:1" onclick="prevItem()">← ก่อนหน้า</button>
           <button class="btn btn-primary" id="nextBtn" style="flex:2" ${canNext?'':'disabled'} onclick="nextItem()">
             ${doneCount+1>=total ? 'สรุปผลตรวจ →' : 'ถัดไป →'}
           </button>`}
    </div>`;

  const matchInput = $('#matchInput');
  if (matchInput){
    matchInput.oninput = (e)=>{
      const val = e.target.value;
      result.enteredCode = val;
      const isMatch = val && normalize(val)===normalize(ref);
      if (val){ activeGroups.forEach(g=>{ result.groupStates[g.label||'_'] = isMatch ? 'OK' : 'NG'; }); }
      else { activeGroups.forEach(g=>{ delete result.groupStates[g.label||'_']; }); }
      e.target.style.borderColor = val ? (isMatch?'var(--teal)':'var(--red)') : 'var(--grey-2)';
      const badge = $('#matchBadge');
      if (badge){
        badge.style.display = val ? '' : 'none';
        badge.className = 'status-chip ' + (val ? (isMatch?'ok':'ng') : 'pending');
        badge.textContent = val ? (isMatch ? 'OK — ตรงกับเลขอ้างอิง' : 'NG — ไม่ตรงกับเลขอ้างอิง') : '';
      }
      const nb = $('#nextBtn');
      if (nb){
        const allSet = activeGroups.every(g => result.groupStates[g.label||'_']);
        nb.disabled = !(result.photo && allSet);
      }
    };
  }

  $('#photoBox').onclick = ()=> openCamera(key, isScan ? 'scan' : 'photo');
  const rb = $('#retakeBtn');
  if (rb) rb.onclick = (e)=>{ e.stopPropagation(); openCamera(key, isScan ? 'scan' : 'photo'); };
}

  state.returnToLoadingList = false;
  state.screen = 'loadingList';
  render();
}

async function exportDamagePDF(){
  toast('กำลังสร้าง PDF...');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const pageW = doc.internal.pageSize.getWidth();
  let y = 40;
  doc.setFontSize(14); doc.setFont(undefined,'bold');
  doc.text('Loading Damage Check', 40, y); y+=22;
  doc.setFontSize(10); doc.setFont(undefined,'normal');
  const m = state.parsed.meta;
  doc.text(`Part No: ${m.partNo||'-'}   Description: ${m.partDescription||'-'}   Customer: ${m.customer||'-'}`, 40, y); y+=16;
  doc.text(`Project No: ${state.jobInfo.projectNo||'-'}   Serial No: ${state.jobInfo.serialNo||'-'}`, 40, y); y+=16;
  doc.text(`QA Inspector: ${state.jobInfo.qaInspector||'-'}   Date: ${state.jobInfo.date||'-'}   Shift: ${state.jobInfo.shift||'-'}`, 40, y); y+=24;

  for (const side of DAMAGE_SIDES){
    const r = state.damageResults[side.id]||{};
    if (y>680){ doc.addPage(); y=40; }
    let imgH=0;
    if (r.photo){
      try{
        const imgProps = doc.getImageProperties(r.photo);
        const w = 160; imgH = (imgProps.height/imgProps.width)*w;
        doc.addImage(r.photo, 'JPEG', 40, y, w, imgH);
        if (r.markers && r.markers.length){
          doc.setFillColor(232,72,60);
          r.markers.forEach(mk=>{
            doc.circle(40 + (mk.x/100)*w, y + (mk.y/100)*imgH, 3, 'F');
          });
        }
      }catch(e){}
    }
    doc.setFont(undefined,'bold'); doc.setFontSize(11);
    doc.text(side.th, 210, y+14);
    doc.setFont(undefined,'normal'); doc.setFontSize(10);
    doc.text(`Status: ${r.status||'Not inspected'}`, 210, y+30);
    let noteH = 0;
    if (r.status==='NG' && r.note){
      const noteLines = doc.splitTextToSize(`Note: ${r.note}`, pageW-210-40);
      doc.text(noteLines, 210, y+45);
      noteH = noteLines.length*11;
    }
    y += Math.max(imgH, 40+noteH) + 14;
  }
  doc.save(`LoadingDamageCheck_${(state.parsed.meta.partNo||'container').replace(/[^a-z0-9]/gi,'_')}_${state.jobInfo.date||''}.pdf`);
}


function setGroupState(key, gkey, val){
  const r = state.results[key];
  r.groupStates[gkey] = val;
  render();
}

function jumpSection(si){
  state.curSection = si;
  state.curItem = 0;
  render();
}
function nextItem(){
  const sec = state.parsed.sections[state.curSection];
  if (state.curItem < sec.items.length-1){ state.curItem++; }
  else if (state.curSection < state.parsed.sections.length-1){ state.curSection++; state.curItem=0; }
  else { state.screen='summary'; }
  render();
}
function prevItem(){
  if (state.curItem>0){ state.curItem--; }
  else if (state.curSection>0){ state.curSection--; state.curItem = state.parsed.sections[state.curSection].items.length-1; }
  else { state.screen='critical'; }
  render();
}

/* ---------- Camera ---------- */
let camStream = null;
let scanLoopId = null;
let nativeDetector = null;
if ('BarcodeDetector' in window){
  try{ nativeDetector = new BarcodeDetector({formats:['qr_code','code_128','ean_13','ean_8','code_39','upc_a','upc_e']}); }catch(e){ nativeDetector = null; }
}

async function openCamera(key, mode, kind){
  state.camTargetKey = key;
  state.camMode = mode || 'photo';
  state.camKind = kind || 'item';
  const overlay = $('#cameraOverlay');
  overlay.style.display = 'flex';
  $('#scanStatus').style.display = state.camMode==='scan' ? 'block' : 'none';
  $('#camShutter').style.display = state.camMode==='scan' ? 'none' : '';
  $('#camScanFail').style.display = state.camMode==='scan' ? '' : 'none';
  try{
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:960}}, audio:false});
    $('#camVideo').srcObject = camStream;
    if (state.camMode==='scan'){ startScanLoop(); }
  }catch(err){
    toast('เปิดกล้องไม่ได้: ' + err.message);
    closeCamera();
    if (state.camMode!=='scan'){
      // fallback to file input (plain photo only)
      $('#photoInput').onchange = (e)=>{
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ()=>{
          if (state.camKind === 'damage'){
            const dr = state.damageResults[key] || (state.damageResults[key] = {photo:null, status:null});
            dr.photo = reader.result;
            dr.markers = [];
          } else {
            const r = state.results[key];
            r.photo = reader.result;
            if (state.camMode === 'loadingNG'){
              const item = itemByKey(key);
              groupsForStage(item).forEach(g=>{ r.groupStates[g.label||'_'] = 'NG'; });
            }
          }
          render();
        };
        reader.readAsDataURL(file);
        e.target.value='';
      };
      $('#photoInput').click();
    } else {
      toast('เปิดกล้องสแกนไม่ได้ กรุณาตรวจด้วยสายตาแทน');
    }
  }
}
function closeCamera(){
  $('#cameraOverlay').style.display = 'none';
  if (camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  if (scanLoopId){ clearInterval(scanLoopId); scanLoopId=null; }
}
$('#camCancel').onclick = closeCamera;

/* ---------- Marker overlay (tap-to-pin defect location) ---------- */
let markerTargetId = null;
function openMarkerOverlay(id){
  markerTargetId = id;
  const r = state.damageResults[id];
  if (!r || !r.photo) return;
  if (!r.markers) r.markers = [];
  $('#markerImg').src = r.photo;
  renderMarkerPins();
  $('#markerOverlay').style.display = 'flex';
}
function renderMarkerPins(){
  const wrap = $('#markerImgWrap');
  wrap.querySelectorAll('.pin-dot').forEach(el=>el.remove());
  const r = state.damageResults[markerTargetId];
  (r.markers||[]).forEach(m=>{
    const el = document.createElement('div');
    el.innerHTML = pinSvg(m);
    wrap.appendChild(el.firstElementChild);
  });
}
$('#markerImg').addEventListener('click', (e)=>{
  const rect = e.target.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  const r = state.damageResults[markerTargetId];
  if (!r.markers) r.markers = [];
  r.markers.push({x: Math.round(x*10)/10, y: Math.round(y*10)/10});
  renderMarkerPins();
});
$('#markerUndo').onclick = ()=>{
  const r = state.damageResults[markerTargetId];
  if (r && r.markers && r.markers.length){ r.markers.pop(); renderMarkerPins(); }
};
$('#markerDone').onclick = ()=>{
  $('#markerOverlay').style.display = 'none';
  markerTargetId = null;
  render();
};

/* ---------- Sketch viewer (reference diagram showing where each lettered point is) ---------- */
function openSketch(dataUrl, legend, pin){
  $('#sketchImg').src = dataUrl;
  const lg = $('#sketchLegend');
  if (legend){
    lg.style.display = 'flex';
    lg.innerHTML = `<span style="width:20px;height:20px;border-radius:4px;background:${legend.color};border:1px solid rgba(255,255,255,.5);flex-shrink:0;"></span>
      <span style="color:#fff;font-size:13px;font-weight:700;">มองหากล่องสีนี้ = จุด ${legend.code||''}${pin?' — ตำแหน่งโดยประมาณตามลูกศรในไฟล์ 📍':''}</span>`;
  } else {
    lg.style.display = 'none';
    lg.innerHTML = '';
  }
  const wrap = $('#sketchImgWrap');
  wrap.querySelectorAll('.pin-dot').forEach(el=>el.remove());
  if (pin){
    const el = document.createElement('div');
    el.innerHTML = pinSvg(pin);
    const dot = el.firstElementChild;
    dot.style.width = '32px';
    dot.style.height = '32px';
    dot.style.marginLeft = '-16px';
    dot.style.marginTop = '-32px';
    if (legend && legend.code){
      const label = document.createElement('div');
      label.textContent = legend.code;
      label.style.cssText = `position:absolute;left:${pin.x}%;top:${pin.y}%;transform:translate(6px,-46px);color:#fff;font-weight:800;font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.8);pointer-events:none;`;
      wrap.appendChild(label);
    }
    wrap.appendChild(dot);
  }
  $('#sketchOverlay').style.display = 'flex';
}
function openSketchForSection(si){
  const sec = state.parsed.sections[si];
  const item = sec ? sec.items[state.curItem] : null;
  if (sec && sec.sketch){
    openSketch(
      sec.sketch,
      item && item.legendColor ? {color:item.legendColor, code:item.code} : null,
      item && item.pin ? item.pin : null
    );
  }
}
$('#sketchClose').onclick = ()=>{ $('#sketchOverlay').style.display = 'none'; };


$('#camShutter').onclick = ()=>{
  const video = $('#camVideo');
  const canvas = $('#camCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  if (state.camTargetKey){
    if (state.camKind === 'damage'){
      const dr = state.damageResults[state.camTargetKey] || (state.damageResults[state.camTargetKey] = {photo:null, status:null});
      dr.photo = dataUrl;
      dr.markers = []; // old pins no longer apply to the new photo
    } else {
      const r = state.results[state.camTargetKey];
      r.photo = dataUrl;
      if (state.camMode === 'loadingNG'){
        const item = itemByKey(state.camTargetKey);
        groupsForStage(item).forEach(g=>{ r.groupStates[g.label||'_'] = 'NG'; });
      }
    }
  }
  closeCamera();
  render();
};
$('#camScanFail').onclick = ()=>{
  // operator confirms the code truly can't be scanned: capture current frame as NG evidence
  const video = $('#camVideo');
  const canvas = $('#camCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  const key = state.camTargetKey;
  if (key){
    const r = state.results[key];
    r.photo = dataUrl;
    r.scannedValue = null;
    const item = itemByKey(key);
    if (item){ item.groups.forEach(g=>{ r.groupStates[g.label||'_'] = 'NG'; }); }
  }
  closeCamera();
  render();
};

function itemByKey(key){
  const [si,ii] = key.split('-').map(Number);
  const sec = state.parsed.sections[si];
  return sec ? sec.items[ii] : null;
}

function startScanLoop(){
  const video = $('#camVideo');
  const canvas = $('#camCanvas');
  const ctx = canvas.getContext('2d', {willReadFrequently:true});
  scanLoopId = setInterval(async ()=>{
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video,0,0);
    let value = null;
    try{
      if (nativeDetector){
        const codes = await nativeDetector.detect(canvas);
        if (codes && codes.length) value = codes[0].rawValue;
      } else if (window.jsQR){
        const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        const res = jsQR(imgData.data, canvas.width, canvas.height);
        if (res && res.data) value = res.data;
      }
    }catch(e){ /* keep trying */ }
    if (value){
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      const key = state.camTargetKey;
      if (key){
        const r = state.results[key];
        r.photo = dataUrl;
        r.scannedValue = value;
        const item = itemByKey(key);
        if (item){ item.groups.forEach(g=>{ r.groupStates[g.label||'_'] = 'OK'; }); }
      }
      closeCamera();
      render();
    }
  }, 350);
}


/* ---------- Screen: Summary ---------- */
function renderSummary(){
  const sections = state.parsed.sections;
  let okCount=0, ngCount=0, pendingCount=0;
  const rows = [];
  let firstPending = null;
  sections.forEach((sec,si)=>{
    sec.items.forEach((it,ii)=>{
      const key = `${si}-${ii}`;
      const r = state.results[key] || {photo:null, groupStates:{}};
      const required = groupsForStage(it);
      const vals = required.map(g => r.groupStates[g.label||'_']).filter(Boolean);
      let status = 'pending';
      if (vals.length===required.length && vals.length>0 && r.photo){
        status = vals.includes('NG') ? 'ng' : 'ok';
      }
      if (status==='ok') okCount++; else if (status==='ng') ngCount++;
      else { pendingCount++; if (!firstPending) firstPending = {si,ii}; }
      rows.push({si,ii,sec:sec.name,item:it,critical:!!state.criticalMap[key],r,status});
    });
  });
  state.firstPending = firstPending;

  app.innerHTML = `
    ${topbar('สรุปผลการตรวจ')}
    <div class="screen">
      <h2>สรุปผลการตรวจ</h2>
      <p class="lead">${state.parsed.meta.partNo||''} · ${state.jobInfo.projectNo||'-'} · ${state.jobInfo.date||''}</p>
      <div class="summary-stats">
        <div class="stat-card ok"><div class="num">${okCount}</div><div class="lbl">OK</div></div>
        <div class="stat-card ng"><div class="num">${ngCount}</div><div class="lbl">NG</div></div>
        <div class="stat-card"><div class="num">${pendingCount}</div><div class="lbl">ยังไม่ตรวจ</div></div>
      </div>
      ${pendingCount>0 ? `<div class="match-warn">⚠ ยังตรวจไม่ครบ ${pendingCount} จุด — ต้องตรวจให้ครบทุกจุดก่อนจึงจะสรุปรายงาน/Export ได้ <button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="goToFirstPending()">ไปยังจุดที่ค้าง</button></div>` : ''}
      ${rows.map(row=>`
        <div class="summary-item">
          ${row.r.photo ? `<img src="${row.r.photo}">` : `<div style="width:44px;height:44px;border-radius:8px;background:var(--grey)"></div>`}
          <div class="info">
            <div class="t1">${row.sec} · ${row.item.code||'•'} ${row.critical?'⚠':''}</div>
            <div class="t2">${escapeHtml(row.item.desc)}</div>
          </div>
          <div class="status-chip ${row.status}">${row.status==='ok'?'OK':row.status==='ng'?'NG':'ยังไม่ตรวจ'}</div>
        </div>
      `).join('')}
    </div>
    <div class="bottom-bar">
      <button class="btn btn-secondary" style="flex:1" onclick="backToInspectFromSummary()">← ตรวจต่อ</button>
      <button class="btn btn-primary" style="flex:2" ${pendingCount>0?'disabled':''} onclick="exportPDF()">
        ${pendingCount>0 ? `ตรวจไม่ครบ (เหลือ ${pendingCount})` : 'ยืนยันและ Export PDF'}
      </button>
    </div>`;
}
function goToFirstPending(){
  if (!state.firstPending) return;
  state.curSection = state.firstPending.si;
  state.curItem = state.firstPending.ii;
  state.screen = 'inspect';
  render();
}
function backToInspectFromSummary(){
  state.screen='inspect';
  render();
}

/* ---------- Export PDF ---------- */
async function exportPDF(){
  toast('กำลังสร้าง PDF...');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const pageW = doc.internal.pageSize.getWidth();
  let y = 40;

  doc.setFontSize(14); doc.setFont(undefined,'bold');
  doc.text('Full Container Inspection Report', 40, y); y+=22;
  doc.setFontSize(10); doc.setFont(undefined,'normal');
  const m = state.parsed.meta;
  doc.text(`Part No: ${m.partNo||'-'}   Description: ${m.partDescription||'-'}   Customer: ${m.customer||'-'}`, 40, y); y+=16;
  doc.text(`Project No: ${state.jobInfo.projectNo||'-'}   Serial No: ${state.jobInfo.serialNo||'-'}`, 40, y); y+=16;
  doc.text(`QA Inspector: ${state.jobInfo.qaInspector||'-'}   Date: ${state.jobInfo.date||'-'}   Shift: ${state.jobInfo.shift||'-'}`, 40, y); y+=16;
  if (state.stage) doc.text(`Inspection Stage: ${state.stage==='loading'?'Loading':'End of line'}`, 40, y);
  y+=24;

  const sections = state.parsed.sections;
  for (let si=0; si<sections.length; si++){
    const sec = sections[si];
    if (y>760){ doc.addPage(); y=40; }
    doc.setFontSize(12); doc.setFont(undefined,'bold');
    doc.text(sec.name, 40, y); y+=16;
    doc.setFontSize(9); doc.setFont(undefined,'normal');

    for (let ii=0; ii<sec.items.length; ii++){
      const it = sec.items[ii];
      const key = `${si}-${ii}`;
      const r = state.results[key] || {photo:null, groupStates:{}};
      const critical = !!state.criticalMap[key];
      const statusText = Object.values(r.groupStates).length
        ? Object.entries(r.groupStates).map(([k,v])=>`${k||'Result'}: ${v}`).join(' | ')
        : 'Not inspected';

      if (y>720){ doc.addPage(); y=40; }
      let imgH = 0;
      if (r.photo){
        try{
          const imgProps = doc.getImageProperties(r.photo);
          const w = 90; imgH = (imgProps.height/imgProps.width)*w;
          doc.addImage(r.photo, 'JPEG', 40, y, w, imgH);
        }catch(e){}
      }
      const textX = r.photo ? 140 : 40;
      doc.setFont(undefined,'bold');
      doc.text(`${it.code||'-'} ${critical?'[CRITICAL]':''}`, textX, y+10);
      doc.setFont(undefined,'normal');
      const desc = doc.splitTextToSize(it.desc, pageW-textX-40);
      doc.text(desc, textX, y+22);
      doc.text(statusText, textX, y+22+desc.length*11+6);

      y += Math.max(imgH, 22+desc.length*11+18) + 10;
    }
    y+=6;
  }
  doc.save(`Inspection_${(state.parsed.meta.partNo||'container').replace(/[^a-z0-9]/gi,'_')}_${state.jobInfo.date||''}.pdf`);
}

/* ---------- Utils ---------- */
function pinSvg(m, small){
  return `<div class="pin-dot${small?' pin-dot-sm':''}" style="left:${m.x}%;top:${m.y}%;">
    <svg viewBox="0 0 24 24"><path fill="#E8483C" stroke="#fff" stroke-width="1.5" d="M12 2C7.6 2 4 5.6 4 10c0 6 8 12 8 12s8-6 8-12c0-4.4-3.6-8-8-8z"/><circle cx="12" cy="10" r="3" fill="#fff"/></svg>
  </div>`;
}
function toast(msg){
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}
function escapeHtml(s){
  return (s||'').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function resetApp(){
  if (!confirm('เริ่มงานใหม่ทั้งหมด? ข้อมูลที่ตรวจไปแล้วจะหายไป')) return;
  Object.assign(state, {
    screen:'upload', workbook:null, zip:null, sheetNames:[], parsed:null,
    jobInfo:{projectNo:'',serialNo:'',idCode:'',qaInspector:'',date:'',shift:'Day'},
    criticalMap:{}, results:{}, curSection:0, curItem:0, camTargetKey:null, camMode:'photo',
    hasLoadingGroup:false, stage:null, returnToLoadingList:false, firstPending:null,
    damageResults:{}, camKind:'item'
  });
  render();
}

render();
</script>
